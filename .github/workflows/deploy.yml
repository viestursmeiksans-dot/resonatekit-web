# Publish resonatekit.com to Cloudflare Pages via Direct Upload on every push to main.
# The Pages project is NOT git-connected, so this consumes ZERO Pages build quota — the
# "build" runs on GitHub Actions minutes. This is also the deploy trigger for the labojumi
# edit-by-message system: it commits here, this Action publishes.
name: deploy

on:
  push:
    branches: [main]

concurrency:
  group: pages-deploy        # collapse rapid commits into one in-flight deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # Build the Eleventy site: src/ -> _site/  (output is what Pages serves now).
      - run: npm ci && npx @11ty/eleventy
      - name: Publish to Cloudflare Pages (Direct Upload)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}   # repo secret: Pages:Edit token
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }} # repo secret
          # Eleventy output dir (was repo root in the flat-HTML v1).
          command: pages deploy _site/ --project-name=resonatekit --branch=main
